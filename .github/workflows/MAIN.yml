name: Generate Snake

on:
  schedule:
    # Runs every 12 hours
    - cron: "0 */12 * * *"
  workflow_dispatch:

# Grant write permissions so the action can commit files
permissions:
  contents: write
    
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Upgraded to v4 to use modern Node runtimes
      - uses: actions/checkout@v4
      
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: Johir2028
          svg_out_path: dist/github-contribution-grid-snake.svg

      # Upgraded to v4 to use modern Node runtimes
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
